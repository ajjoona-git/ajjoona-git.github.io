<ul class="sidebar-footer__list">
  {% for contact in site.data.contact %}
    {% if contact.type == 'theme-toggle' %}
      <li>
        <button id="mode-toggle-btn" aria-label="Toggle color mode">
          <i class="{{ contact.icon }}"></i>
        </button>
      </li>
    {% elsif contact.type == 'email' %}
      <li>
        <a href="mailto:{{ site.social.email }}" aria-label="email">
          <i class="{{ contact.icon }}"></i>
        </a>
      </li>
    {% elsif contact.type == 'github' %}
      <li>
        <a href="https://github.com/{{ site.github.username }}" aria-label="github" target="_blank" rel="noopener">
          <i class="{{ contact.icon }}"></i>
        </a>
      </li>
    {% else %}
      <!-- ...기타 contact 타입 처리... -->
    {% endif %}
  {% endfor %}
</ul>
<!-- ...existing code... -->
<script>
  document.getElementById('mode-toggle-btn')?.addEventListener('click', function () {
    window.toggleTheme && window.toggleTheme();
  });
</script>
